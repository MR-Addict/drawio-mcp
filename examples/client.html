<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drawio Events Listener Demo</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      #log {
        border: 1px solid #ccc;
        padding: 10px;
        height: 300px;
        overflow-y: scroll;
        background: #f5f5f5;
      }
      .event {
        margin-bottom: 5px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 5px;
      }
      .timestamp {
        color: #888;
        font-size: 0.8em;
      }
    </style>
  </head>
  <body>
    <h1>Drawio Events Listener</h1>
    <p>Listening for updates on <code>/drawio/events</code>...</p>

    <div id="log"></div>

    <script>
      const logEl = document.getElementById("log");

      function log(message, data) {
        const div = document.createElement("div");
        div.className = "event";
        div.innerHTML = `<span class="timestamp">[${new Date().toLocaleTimeString()}]</span> <strong>${message}</strong></pre>`;
        logEl.prepend(div);
      }

      // Connect to the SSE endpoint
      // The server is mounted at /drawio by app-server.ts
      // The events route is defined as /events in routes/drawio.ts
      const eventSource = new EventSource("http://localhost:3000/drawio/events");

      eventSource.onopen = () => {
        log("Connection opened");
      };

      eventSource.onerror = (err) => {
        console.error("EventSource failed:", err);
        log("Connection error - see console");
      };

      // Listen for the specific 'update' event defined in the server
      eventSource.addEventListener("update", (event) => {
        // The data property contains the message payload
        const data = event.data;
        console.log("Received update:", data);
        log(`Update received, length = ${data.length}`);
      });

      // Use 'message' for default messages if any (not used in current server implementation but good practice)
      eventSource.onmessage = (event) => {
        log("Message received:", event.data);
      };
    </script>
  </body>
</html>
