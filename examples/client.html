<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drawio Integration</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
      }
      iframe {
        border: none;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <!-- Embed draw.io in iframe -->
    <iframe
      id="drawio-iframe"
      src="https://embed.diagrams.net/?embed=1&ui=min&spin=1&modified=unsavedChanges&proto=json&configure=1&autosave=1"
    ></iframe>

    <script>
      const iframe = document.getElementById("drawio-iframe");

      // The server URL (assuming server runs on localhost:3000)
      const SERVER_URL = "http://localhost:3000/drawio";

      let currentXml = null;

      // Initialize SSE connection for updates from server
      // Note: The /events endpoint is relative to /drawio
      const eventSource = new EventSource(`${SERVER_URL}/events`);

      eventSource.onopen = () => {
        console.log("Connected to SSE at " + SERVER_URL + "/events");
      };

      eventSource.onerror = (err) => {
        console.error("SSE Error:", err);
      };

      eventSource.addEventListener("update", (event) => {
        const xml = event.data;
        if (xml && xml !== currentXml) {
          console.log("Received update from server");
          currentXml = xml;
          // Send to iframe
          // If the iframe is ready, it will process this.
          // Otherwise, we store it in currentXml and send on 'init'.
          if (iframe.contentWindow) {
            iframe.contentWindow.postMessage(JSON.stringify({ action: "load", xml: currentXml, autosave: 1 }), "*");
          }
        }
      });

      // Handle messages from the draw.io iframe
      window.addEventListener("message", (event) => {
        // Build URL is variable, we can trust '*' or check origin if known
        // For simplicity allow all but check if source is our iframe
        if (event.source !== iframe.contentWindow) return;

        const msg = JSON.parse(event.data);

        switch (msg.event) {
          case "configure":
            // Configure draw.io to not compress XML so it's readable
            iframe.contentWindow.postMessage(
              JSON.stringify({
                action: "configure",
                config: { compressXml: false },
              }),
              "*",
            );
            break;

          case "init":
            // Iframe is initialized
            console.log("Draw.io initialized");
            if (currentXml) {
              // Load the current content if available
              iframe.contentWindow.postMessage(JSON.stringify({ action: "load", xml: currentXml, autosave: 1 }), "*");
            }
            break;

          case "save":
          case "autosave":
            // User saved or autosave triggered
            if (msg.xml && msg.xml !== currentXml) {
              console.log("Saving changes to server...");
              // Optimistically update local state to avoid echo loop
              currentXml = msg.xml;

              fetch(SERVER_URL, {
                method: "POST",
                body: msg.xml,
              })
                .then((res) => {
                  if (!res.ok) console.error("Save failed", res.statusText);
                  else console.log("Saved successfully");
                })
                .catch((err) => console.error("Error saving:", err));
            }
            break;

          default:
            // console.log("Received event:", msg.event);
            break;
        }
      });
    </script>
  </body>
</html>
